<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link href="https://cdn.jsdelivr.net/fontsource/fonts/commit-mono@latest/latin-400-normal.css" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1200px;
      height: 630px;
      background: #f9f8f6;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 80px;
      font-family: 'Commit Mono', monospace;
    }
    h1 {
      font-size: 96px;
      font-weight: 400;
      color: #111;
      margin-bottom: 24px;
    }
    p {
      font-size: 32px;
      color: #666;
      margin-bottom: 48px;
    }
    .keys {
      display: flex;
      gap: 16px;
    }
    .key {
      font-size: 20px;
      background: #eae7e1;
      border: 1px solid #d4d0c8;
      padding: 12px 20px;
      border-radius: 6px;
      color: #444;
    }
  </style>
</head>
<body>
  <h1>Hive</h1>
  <p>session manager for AI coding agents</p>
  <div class="keys">
    <span class="key">n new</span>
    <span class="key">/ search</span>
    <span class="key">t theme</span>
    <span class="key">? help</span>
  </div>
</body>
</html>
