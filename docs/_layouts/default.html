<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ site.description }}">
  
  <meta property="og:title" content="Hive">
  <meta property="og:description" content="{{ site.description }}">
  <meta property="og:image" content="{{ site.url }}{{ site.baseurl }}/og-image.png">
  <meta property="og:url" content="{{ site.url }}{{ site.baseurl }}">
  <meta name="twitter:card" content="summary_large_image">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/fontsource/fonts/commit-mono@latest/latin-400-normal.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/fontsource/fonts/commit-mono@latest/latin-500-normal.css" rel="stylesheet">
  
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      background: #f9f8f6;
      color: #1a1a1a;
      font-family: 'Newsreader', Georgia, serif;
      font-size: 17px;
      line-height: 1.65;
      -webkit-font-smoothing: antialiased;
    }
    
    .page {
      max-width: 720px;
      margin: 0 auto;
      padding: 3rem 1.5rem;
    }
    
    /* Header */
    header {
      margin-bottom: 2.5rem;
    }
    
    h1 {
      font-family: 'Commit Mono', monospace;
      font-size: clamp(2.5rem, 6vw, 3.5rem);
      font-weight: 400;
      letter-spacing: -0.02em;
      color: #111;
      line-height: 1.1;
    }
    
    .tagline {
      font-style: italic;
      color: #666;
      font-size: 1.1rem;
      margin-top: 0.4rem;
    }
    
    .gh-link {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      margin-top: 1rem;
      font-family: 'Commit Mono', monospace;
      font-size: 0.8rem;
      color: #555;
      text-decoration: none;
      border: 1px solid #d4d0c8;
      padding: 0.4rem 0.8rem;
      border-radius: 4px;
      transition: all 0.15s;
    }
    
    .gh-link:hover {
      color: #111;
      border-color: #999;
      background: #f0eeea;
    }
    
    .gh-link svg {
      width: 16px;
      height: 16px;
    }
    
    /* Content */
    h2 {
      font-family: 'Commit Mono', monospace;
      font-size: 0.75rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #999;
      margin-top: 2.5rem;
      margin-bottom: 0.75rem;
    }
    
    p {
      margin-bottom: 1rem;
      color: #333;
    }
    
    p em {
      font-style: italic;
      color: #555;
    }
    
    /* Demo */
    .demo {
      margin: 2rem 0;
      border-radius: 6px;
      overflow: hidden;
      border: 1px solid #e5e2dc;
      background: #1a1b26;
    }
    
    .demo img {
      width: 100%;
      display: block;
    }
    
    /* Code blocks */
    pre, code {
      font-family: 'Commit Mono', monospace;
    }
    
    code {
      font-size: 0.9em;
      background: #eae7e1;
      padding: 0.15rem 0.35rem;
      border-radius: 3px;
    }
    
    pre {
      background: #f3f1ed;
      border: 1px solid #e5e2dc;
      border-radius: 4px;
      padding: 1rem 1.2rem;
      overflow-x: auto;
      font-size: 0.85rem;
      line-height: 1.6;
      margin: 1rem 0;
    }
    
    pre code {
      background: none;
      padding: 0;
    }
    
    /* Install box */
    .install {
      background: #f3f1ed;
      border: 1px solid #e5e2dc;
      border-radius: 4px;
      padding: 1rem 1.2rem;
      margin: 1.5rem 0;
      font-family: 'Commit Mono', monospace;
      font-size: 0.85rem;
    }
    
    .install-cmd {
      color: #333;
      word-break: break-all;
    }
    
    .install-alt {
      margin-top: 0.75rem;
      font-size: 0.8rem;
      color: #777;
    }
    
    /* Keys */
    .keys {
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem;
      margin: 1rem 0;
    }
    
    .key {
      font-family: 'Commit Mono', monospace;
      font-size: 0.8rem;
      background: #eae7e1;
      border: 1px solid #d4d0c8;
      padding: 0.3rem 0.6rem;
      border-radius: 4px;
      color: #444;
    }
    
    /* Features list */
    ul {
      margin: 1rem 0;
      padding-left: 1.2rem;
    }
    
    li {
      margin-bottom: 0.4rem;
      color: #333;
    }
    
    /* Footer */
    footer {
      margin-top: 3rem;
      padding-top: 1.5rem;
      border-top: 1px solid #e5e2dc;
      font-size: 0.85rem;
      color: #999;
    }
    
    footer a {
      color: #666;
    }
    
    @media (max-width: 600px) {
      .page { padding: 2rem 1rem; }
      .keys { gap: 0.4rem; }
    }
  </style>
</head>
<body>
  <div class="page">
    {{ content }}
  </div>
</body>
</html>
